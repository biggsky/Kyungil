<script>
    function solution(picture, k) {
        // console.log(picture);
        let arr = [];
        let num = picture.length * k;
        console.log(num);
        let zero = 0;

        for (let i = 0; i < picture.length; i++) {
            arr[i] = [];
            for (let j = 0; j < picture[i].length; j++) {
                for (let a = 0; a < k; a++) {
                    arr[i] += picture[i][j];
                }
            }
        }
        let arr2 = [];
        for(let i=0; i<arr.length; i++){
            for(let j=0; j<k; j++){
                arr2[zero] = arr[i];
                zero++;
            }
        }

        for(let i=0;i<zero; i++){
            console.log(arr2[i] + " " + i);
            // console.log(arr2[i]);
            // document.write(arr2[i] + "<br>")
        }
        console.log(arr2);
        // return arr2;
    }

    solution([".xx...xx.", "x..x.x..x", "x...x...x", ".x.....x.", "..x...x..", "...x.x...", "....x...."], 2);
    // solution(["x.x", ".x.", "x.x"], 3);
</script>
